#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: code-coverage-report
#          path: app/build/reports/kover/html

  # Job 3: Instrumented Tests (Android)
  instrumented-tests:
    name: Instrumented Tests
      # We use Ubuntu because macOS runners consume 10x the GitHub Actions billing minutes
    runs-on: ubuntu-latest

    steps:
        - name: Checkout code
          uses: actions/checkout@v4

        # Hardware acceleration (KVM) is required for x86_64 emulators on Linux.
        # This step enables it on the standard Ubuntu runner.
        - name: Enable KVM group perms
          run: |
              echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
              sudo udevadm control --reload-rules
              sudo udevadm trigger --name-match=kvm

        - name: Set up JDK
          uses: actions/setup-java@v4
          with:
              distribution: 'zulu'
              java-version: '17' # Update this to match your project's Java version

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v3

        - name: Run Instrumented Tests
          uses: reactivecircus/android-emulator-runner@v2
          with:
              api-level: 31
              arch: x86_64
              target: google_apis
              disable-animations: true
              script: ./gradlew connectedAndroidTest

  # Job 4: Code Quality Checks (Lint, Detekt, Spotless)
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Spotless Check
        run: ./gradlew spotlessCheck --no-daemon

      - name: Run Detekt
        run: ./gradlew detekt --no-daemon

      - name: Run Lint
        run: ./gradlew lintDebug --no-daemon

